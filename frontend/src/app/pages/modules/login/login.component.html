<form (ngSubmit)="onLogin()" class="auth-form">
  <div class="form-group">
    <label>Email</label>
    <input type="email" name="email" [(ngModel)]="credentials.email" placeholder="ejemplo@correo.com" required>
  </div>
  <div class="form-group">
    <label>Contraseña</label>
    <input type="password" name="password" [(ngModel)]="credentials.password" placeholder="********" required>
  </div>
  <p *ngIf="errorMessage" class="error-text">{{ errorMessage }}</p>
  <button type="submit" class="submit-btn">Entrar</button>
</form>
