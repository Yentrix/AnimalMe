<form (ngSubmit)="onRegister()" class="auth-form register-grid">
  <div class="form-group">
    <label>Nombre</label>
    <input type="text" name="firstName" [(ngModel)]="userData.firstName" required>
  </div>
  <div class="form-group full-width">
    <label>Email</label>
    <input type="email" name="email" [(ngModel)]="userData.email" required>
  </div>
  <div class="form-group full-width">
    <label>Contraseña</label>
    <input type="password" name="password" [(ngModel)]="userData.password" required>
    <div class="password-strength" *ngIf="userData.password.length > 0">
      <div class="strength-track">
        <span class="strength-fill" [style.width.%]="passwordStrengthPercent"></span>
      </div>
      <small>Fuerza: {{ passwordStrengthLabel }}</small>
    </div>
  </div>
  <span class="error-text" *ngIf="errorMessage">
    {{ errorMessage }}
  </span>
  <button type="submit" class="submit-btn full-width" [disabled]="!canSubmitRegister">Crear Cuenta</button>
</form>
