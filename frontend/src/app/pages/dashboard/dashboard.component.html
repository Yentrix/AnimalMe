<div class="layout-container">
    <!-- SIDEBAR -->
    <nav class="sidebar no-select" #sidebarContainer [class.mobile-visible]="isMobileSidebarOpen">

        <!-- BRAND -->
        <div class="brand">
            <img src="assets/logo_empty.png" alt="AnimalMe Logo" class="brand-logo" />
            <span class="brand-name">AnimalMe</span>
        </div>

        <ul *ngIf="currentSection === SidebarSectionEnum.ROOT" class="menu animate-items">
            <li class="menu-item" *ngFor="let item of rootMenu; let i = index" [ngStyle]="{'--delay': i}"
                [routerLink]="item.route" routerLinkActive="active" (click)="item.section && openSection(item.section)">
                <span class="icon" [innerHTML]="sanitizedIcons[item.icon]"></span>
                <span>{{ item.label }}</span>
            </li>
        </ul>

        <div class="logout-item menu-item" *ngIf="user$ | async" (click)="logOut()">
            <span class="icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                    <polyline points="16 17 21 12 16 7"></polyline>
                    <line x1="21" y1="12" x2="9" y2="12"></line>
                </svg>
            </span>
            <span >Cerrar Sesión</span>
        </div>
    </nav>

    <div class="main-content">
        <!-- TOPBAR -->
        <header class="topbar">
            <div class="topbar-left no-select">
                <img src="assets/logo_empty.png" alt="AnimalMe Logo" class="brand-logo" />
                <span class="brand-name">AnimalMe</span>
            </div>

            <div class="topbar-right no-select">

                <button class="theme-toggle topbar-toggle" (click)="toggleTheme()">
                    <span class="icon">
                        <ng-container *ngIf="!(isDarkMode$ | async)">
                            <!-- LIGHT MODE -->
                            <svg xmlns="http://www.w3.org/2000/svg" width="19" height="19" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round">
                                <path d="M21 12.79A9 9 0 1 1 11.21 3 
                             7 7 0 0 0 21 12.79z"></path>
                            </svg>
                        </ng-container>

                        <ng-container *ngIf="isDarkMode$ | async">
                            <!-- DARK MODE -->
                            <svg xmlns="http://www.w3.org/2000/svg" width="19" height="19" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round">
                                <circle cx="12" cy="12" r="5"></circle>
                                <line x1="12" y1="1" x2="12" y2="3" />
                                <line x1="12" y1="21" x2="12" y2="23" />
                                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
                                <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
                                <line x1="1" y1="12" x2="3" y2="12" />
                                <line x1="21" y1="12" x2="23" y2="12" />
                                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
                                <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
                            </svg>
                        </ng-container>
                    </span>
                </button>

                <div class="login-item" *ngIf="!(user$ | async)" routerLink="/auth" routerLinkActive="active">
                    Iniciar sesión
                </div>

                <div class="notification-wrapper" *ngIf="user$ | async">
                    <button
                        class="notification-btn topbar-toggle"
                        (click)="toggleNotificationsPanel()"
                        [attr.aria-label]="'Abrir notificaciones'"
                    >
                        <span class="icon" [innerHTML]="sanitizedIcons['ICON_BELL']"></span>
                        <span class="notification-count" *ngIf="unreadNotificationsCount > 0">{{ unreadNotificationsCount }}</span>
                    </button>

                    <div class="notifications-panel" *ngIf="isNotificationPanelOpen">
                        <header class="notifications-header">
                            <h3>Notificaciones</h3>
                            <button type="button" class="mark-read-btn" (click)="markAllNotificationsAsRead()">Marcar todo leido</button>
                        </header>

                        <div class="notifications-list" *ngIf="notifications.length > 0; else emptyNotifications">
                            <article
                                class="notification-item"
                                *ngFor="let notification of notifications"
                                [class.read]="notification.isRead"
                            >
                                <div class="notification-main">
                                    <strong>{{ notification.title }}</strong>
                                    <p>{{ notification.message }}</p>
                                    <small>{{ notification.createdAt | date:'medium' }}</small>
                                </div>
                                <button
                                    type="button"
                                    class="notification-read-btn"
                                    *ngIf="!notification.isRead"
                                    (click)="markNotificationAsRead(notification)"
                                >
                                    Marcar leida
                                </button>
                            </article>
                        </div>

                        <ng-template #emptyNotifications>
                            <p class="notifications-empty">No tienes notificaciones nuevas.</p>
                        </ng-template>
                    </div>
                </div>
            </div>
        </header>

        <!-- PAGE CONTAINER -->
        <section class="page-container">
            <div class="page" [ngClass]="{ 'fade-in': fadeIn }">
                <router-outlet (activate)="onActivate()"></router-outlet>
            </div>
        </section>
    </div>

    <button class="floating-menu-btn mobile-only" (click)="toggleMobileSidebar()">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="3" y1="6" x2="21" y2="6" />
            <line x1="3" y1="12" x2="21" y2="12" />
            <line x1="3" y1="18" x2="21" y2="18" />
        </svg>
    </button>

    <nav class="bottom-nav no-select" [class.hidden]="isMobileSidebarOpen">
    </nav>
</div>
